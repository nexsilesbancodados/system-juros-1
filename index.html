    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FinancialService",
        "name": "Credmais Securitizadora",
        "url": "https://hello-login-buddy-00.lovable.app/",
        "description": "Soluções financeiras para antecipação de recebíveis, boleto garantido, crediário, consultoria e gestão de contas."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div
      id="app-splash"
      aria-hidden="true"
      style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#0D5E45 0%,#16211D 62%);transition:opacity .35s ease;font-family:system-ui,-apple-system,sans-serif;color:#F7F4EC;"
    >
      <div style="width:64px;height:64px;border-radius:999px;background:#D8A941;color:#16211D;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(216,169,65,.32);margin-bottom:1rem;font-size:1.4rem;font-weight:900;">
        C+
      </div>
      <div style="font-size:1rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;">Credmais</div>
      <div style="margin-top:.35rem;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(247,244,236,.7);">Securitizadora</div>
    </div>
    <script>
      window.__SJ_HIDE_SPLASH__ = function () {
        var splash = document.getElementById("app-splash");
        if (!splash) return;
        splash.style.opacity = "0";
        setTimeout(function () { splash.remove(); }, 350);
      };
      window.addEventListener("load", function () {
        setTimeout(function () {
          if (window.__SJ_HIDE_SPLASH__) window.__SJ_HIDE_SPLASH__();
        }, 700);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
